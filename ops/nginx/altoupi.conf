upstream altoupi_puma {
  server unix:/var/www/altoupi/shared/tmp/sockets/puma.sock fail_timeout=0;
}

server {
  listen 80;
  listen [::]:80;
  server_name altoupi.fr www.altoupi.fr;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name altoupi.fr www.altoupi.fr;

  # Managed by Certbot once certificates are issued.
  ssl_certificate /etc/letsencrypt/live/altoupi.fr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/altoupi.fr/privkey.pem;

  root /var/www/altoupi/current/public;
  access_log /var/log/nginx/altoupi.access.log;
  error_log /var/log/nginx/altoupi.error.log warn;

  client_max_body_size 20m;
  keepalive_timeout 10;

  location /assets/ {
    gzip_static on;
    expires max;
    add_header Cache-Control public;
    try_files $uri =404;
  }

  location / {
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_redirect off;
    proxy_read_timeout 300;
    proxy_pass http://altoupi_puma;
  }

  location = /up {
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://altoupi_puma;
  }
}
